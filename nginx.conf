server {
    listen 3000;
    server_name _;

    # Base path for multi-app hosting
    set $base_path "/spellwise";

    # Gzip compression
    gzip on;
    gzip_types text/plain text/css text/xml text/javascript application/x-javascript application/javascript application/json;
    gzip_disable "msie6";

    # Security headers
    add_header X-Frame-Options "SAMEORIGIN" always;
    add_header X-Content-Type-Options "nosniff" always;
    add_header X-XSS-Protection "1; mode=block" always;
    add_header Referrer-Policy "strict-origin-when-cross-origin" always;

    # Cache static assets
    location ~* \.(js|css|png|jpg|jpeg|gif|ico|svg|woff|woff2|ttf|eot)$ {
        expires 1y;
        add_header Cache-Control "public, immutable";
    }

    # Serve index.html for SPA routing
    # Handles both root and subpath
    location ~ ^(/spellwise)?/?$ {
        root /usr/share/nginx/html;
        try_files $uri /index.html;
        add_header Cache-Control "no-cache";
    }

    # Static files for SPA (JS, CSS, etc.)
    location ~ ^/spellwise/assets/ {
        alias /usr/share/nginx/html/assets/;
        expires 1y;
        add_header Cache-Control "public, immutable";
    }

    # Catch-all for SPA routes (redirect to index.html)
    location ~ ^/spellwise/(.*)$ {
        # Check if file exists
        if (!-f $request_filename) {
            root /usr/share/nginx/html;
            rewrite ^/spellwise/(.*?)$ /index.html break;
        }
    }

    # Proxy API requests to server (strip /spellwise prefix)
    location ~ ^/spellwise/api/(.*)$ {
        proxy_pass http://server:4000/api/$1;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection 'upgrade';
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header X-Forwarded-Path /spellwise;
        proxy_cache_bypass $http_upgrade;
        proxy_connect_timeout 60s;
        proxy_send_timeout 60s;
        proxy_read_timeout 60s;
    }

    # Proxy static/audio files (strip /spellwise prefix)
    location ~ ^/spellwise/static/(.*)$ {
        proxy_pass http://server:4000/static/$1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        expires 30d;
    }

    # Root path handling
    location / {
        root /usr/share/nginx/html;
        try_files $uri @redirect_spa;
    }

    location @redirect_spa {
        rewrite ^(.*)$ /index.html break;
    }
}
