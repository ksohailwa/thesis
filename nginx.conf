server {
    listen 3000;
    server_name _;

    root /usr/share/nginx/html;

    # Gzip compression
    gzip on;
    gzip_types text/plain text/css text/xml text/javascript application/x-javascript application/javascript application/json;
    gzip_disable "msie6";

    # Security headers
    add_header X-Frame-Options "SAMEORIGIN" always;
    add_header X-Content-Type-Options "nosniff" always;
    add_header X-XSS-Protection "1; mode=block" always;
    add_header Referrer-Policy "strict-origin-when-cross-origin" always;

    # Proxy API requests to server
    location ~ ^/spellwise/api/(.*)$ {
        proxy_pass http://server:4000/api/$1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    # Also support /SpellWise/api for backwards compatibility
    location ~ ^/SpellWise/api/(.*)$ {
        proxy_pass http://server:4000/api/$1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    # Proxy static/audio files from server
    location ~ ^/spellwise/static/(.*)$ {
        proxy_pass http://server:4000/static/$1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        expires 30d;
    }

    # Static assets with caching (JS, CSS, images, fonts)
    location ~ ^/spellwise/assets/ {
        alias /usr/share/nginx/html/assets/;
        expires 1y;
        add_header Cache-Control "public, immutable";
    }

    # SPA catch-all: serve index.html for all /spellwise/* routes
    location /spellwise {
        try_files $uri $uri/ /index.html;
        add_header Cache-Control "no-cache";
    }

    # Root redirect to /spellwise
    location = / {
        return 302 /spellwise/;
    }

    # Fallback
    location / {
        try_files $uri $uri/ /index.html;
    }
}
