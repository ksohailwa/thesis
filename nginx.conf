server {
    listen 3000;
    server_name _;

    # Gzip compression
    gzip on;
    gzip_types text/plain text/css text/xml text/javascript application/x-javascript application/javascript application/json;
    gzip_disable "msie6";

    # Security headers
    add_header X-Frame-Options "SAMEORIGIN" always;
    add_header X-Content-Type-Options "nosniff" always;
    add_header X-XSS-Protection "1; mode=block" always;
    add_header Referrer-Policy "strict-origin-when-cross-origin" always;

    # Proxy API requests before SPA fallback. Server is mounted at /SpellWise in production.
    location ~* ^/spellwise/api/(.*)$ {
        proxy_pass http://server:4000/SpellWise/api/$1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    # Proxy generated audio/static files before SPA fallback.
    location ~* ^/spellwise/static/(.*)$ {
        proxy_pass http://server:4000/SpellWise/static/$1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        expires 30d;
    }

    # Static files for SPA (JS, CSS, etc.). Match both /SpellWise and /spellwise.
    location ~* ^/spellwise/assets/(.*)$ {
        alias /usr/share/nginx/html/assets/$1;
        expires 1y;
        add_header Cache-Control "public, immutable";
    }

    # Serve index.html for SPA routing. Match both /SpellWise and /spellwise.
    location ~* ^(/spellwise)?/?$ {
        root /usr/share/nginx/html;
        try_files $uri /index.html;
        add_header Cache-Control "no-cache";
    }

    # Catch-all for SPA routes after API/static/audio have been considered.
    location ~* ^/spellwise/(.*)$ {
        root /usr/share/nginx/html;
        rewrite ^/spellwise/(.*?)$ /index.html break;
    }

    # Root path handling
    location / {
        root /usr/share/nginx/html;
        try_files $uri @redirect_spa;
    }

    location @redirect_spa {
        rewrite ^(.*)$ /index.html break;
    }
}
